## Managed components for the multitouch MPE OSC/MIDI controller on
## ESP32-P4-Nano + EK79007 panel + on-board ESP32-C6 radio.
dependencies:
  idf:
    version: ">=6.0,<7.0"

  ## EK79007 7" 1024x600 MIPI-DSI panel — Espressif Function-EV-Board
  ## sub-board, shipped with the Waveshare ESP32-P4-Nano kit.
  espressif/esp_lcd_ek79007:
    version: "^2.0.2"

  ## GT911 5-point capacitive touch controller. Used here at full
  ## 5-point capacity — one MPE member channel per finger.
  espressif/esp_lcd_touch_gt911:
    version: "^1.2.0"

  ## Bridges the WiFi API to the on-board ESP32-C6 over SDIO.
  espressif/esp_hosted:
    version: "^2.12.7"

  espressif/esp_wifi_remote:
    version: ">=1.3.1"
    rules:
      - if: target in [esp32p4]
